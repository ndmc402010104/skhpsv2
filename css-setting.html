<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>CSS Setting</title>
</head>
<body>
  <main>
    <section class="skhps-card">
      <p class="skhps-muted">CSS / UI Setting</p>
      <h1>CSS Setting AJAX Playground</h1>
      <p>
        這一頁固定作為 AJAX 調用頁。上方按鈕只負責載入 /CSS/ 目錄下的 HTML fragment。
      </p>

      <p>
        baseStyle 狀態：
        <strong data-skhps-base-style-status>baseStyle 載入中...</strong>
      </p>

      <p class="skhps-toolbar">
        <a class="skhps-btn skhps-btn-secondary" href="admin.html">回系統後台</a>
        <a class="skhps-btn skhps-btn-secondary" href="index.html">回首頁</a>
      </p>
    </section>

    <section class="skhps-card">
      <h2>Playground 分頁</h2>
      <p>
        目前先完成「基礎樣式」。其他分頁先建立 AJAX 入口，之後逐頁補內容。
      </p>

      <p class="skhps-toolbar">
        <button class="skhps-btn skhps-btn-primary" type="button" data-css-fragment="CSS/base-style-playground.html">基礎樣式</button>
        <button class="skhps-btn skhps-btn-secondary" type="button" data-css-fragment="CSS/token-style-playground.html">Token</button>
        <button class="skhps-btn skhps-btn-secondary" type="button" data-css-fragment="CSS/layout-style-playground.html">Layout</button>
        <button class="skhps-btn skhps-btn-secondary" type="button" data-css-fragment="CSS/header-style-playground.html">Header</button>
        <button class="skhps-btn skhps-btn-secondary" type="button" data-css-fragment="CSS/footer-style-playground.html">Footer</button>
        <button class="skhps-btn skhps-btn-secondary" type="button" data-css-fragment="CSS/button-style-playground.html">按鈕</button>
        <button class="skhps-btn skhps-btn-secondary" type="button" data-css-fragment="CSS/form-style-playground.html">表單</button>
      </p>

      <p id="cssAjaxStatus" class="skhps-muted">尚未載入。</p>
    </section>

    <div id="cssAjaxContent"></div>
  </main>

  <footer class="skhps-footer" data-skhps-footer>
    Footer 載入中...
  </footer>

  <script src="assets/js/config.js?v=202606092034"></script>
  <script src="assets/js/css-setting-sheet-apply.js"></script>
  <script>
    (function () {
      var statusEl = document.getElementById("cssAjaxStatus");
      var contentEl = document.getElementById("cssAjaxContent");

      function setStatus(message) {
        if (statusEl) {
          statusEl.textContent = message;
        }
      }

      function loadFragment(path) {
        setStatus("載入中：" + path);

        fetch(path, { cache: "no-store" })
          .then(function (res) {
            return res.text().then(function (text) {
              return {
                ok: res.ok,
                status: res.status,
                statusText: res.statusText,
                text: text
              };
            });
          })
          .then(function (result) {
            if (!result.ok) {
              throw new Error("HTTP " + result.status + " " + result.statusText);
            }

            contentEl.innerHTML = result.text;
            setStatus("已載入：" + path);

            window.setTimeout(function () {
              if (path === "CSS/footer-style-playground.html" &&
                  window.SKHPSFooterStyleEditor &&
                  typeof window.SKHPSFooterStyleEditor.init === "function") {
                window.SKHPSFooterStyleEditor.init();
              }

              if (window.SKHPSCssSettingEditorCore &&
                  typeof window.SKHPSCssSettingEditorCore.init === "function") {
                window.SKHPSCssSettingEditorCore.init(contentEl);
              }
            }, 0);

            if (window.SKHPSCssStyleEditState) {
              window.SKHPSCssStyleEditState.init(contentEl);
            }

            if (window.SKHPSApplyBaseStyleFromSheet) {
              window.SKHPSApplyBaseStyleFromSheet();
            }

            if (window.SKHPSCssSettingEditorCore) {
              window.SKHPSCssSettingEditorCore.init(contentEl);
            }

            if (window.SKHPSFooterStyleEditor && typeof window.SKHPSFooterStyleEditor.init === "function") {
              window.SKHPSFooterStyleEditor.init();
            }

            contentEl.scrollIntoView({ behavior: "smooth", block: "start" });
          })
          .catch(function (error) {
            contentEl.innerHTML =
              '<section class="skhps-card">' +
              '<h2>載入失敗</h2>' +
              '<pre>' + String(error.message || error) + '</pre>' +
              '</section>';

            setStatus("載入失敗：" + path);
          });
      }

      document.querySelectorAll("[data-css-fragment]").forEach(function (button) {
        button.addEventListener("click", function () {
          loadFragment(button.getAttribute("data-css-fragment"));
        });
      });

      window.SKHPSCssAjaxPage = {
        loadFragment: loadFragment
      };

      loadFragment("CSS/base-style-playground.html");
    })();
  </script>
  <script src="assets/js/backend-client.js?v=202606092034"></script>
  <script src="assets/js/base-style-editor.js"></script>
  <script src="assets/js/css-setting-editor-core.js"></script>
  <script src="assets/js/css-setting-sheet-save.js"></script>
  <script src="assets/js/footer-style-editor.js"></script>




  <script src="assets/js/footer.js?v=202606092034"></script>
</body>
</html>
