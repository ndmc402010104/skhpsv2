- 主要畫面使用 CSS Sheet / 共用 CSS class，不寫 inline CSS。

<html
  lang="zh-Hant"
  class="skhps-css-loading"
  data-skhps-page-id="css-setting"
  data-skhps-page-map-parent-label="系統後台"
  data-skhps-page-map-parent-href="admin.html"
  data-skhps-page-map-current="CSS Setting"
  data-loading-title="CSS Setting"
  data-skhps-loading-tasks="css-runtime"
>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <script src="assets/js/loading-cache-probe.js?v=20260611"></script>
  <link rel="stylesheet" href="assets/css/skhps-loading.css?v=202606131245">
  <title>CSS Setting</title>
</head>

<body class="skhps-body">
  <header id="header" class="skhps-header" data-skhps-header></header>

  <main class="skhps-page skhps-css-setting-page">
    <div class="skhps-container skhps-css-setting-shell">
      <section class="skhps-hero skhps-css-setting-hero" aria-labelledby="cssSettingTitle">
        <div class="skhps-hero-card skhps-css-setting-hero-card">
          <div class="skhps-css-setting-hero-content">
            <p class="skhps-eyebrow">CSS / UI Setting</p>
            <h1 id="cssSettingTitle" class="skhps-page-title skhps-css-setting-title">
              CSS Setting AJAX Playground
            </h1>
            <p class="skhps-page-subtitle skhps-css-setting-subtitle">
              這一頁固定作為 AJAX 調用頁。上方按鈕只負責載入 /CSS/ 目錄下的 HTML fragment。
            </p>
          </div>

          <div class="skhps-meta-grid skhps-css-setting-meta-grid" aria-label="CSS Setting 狀態">
            <div class="skhps-meta-item skhps-css-setting-meta-item">
              <span class="skhps-meta-label">CSS總表</span>
              <strong
                class="skhps-meta-value"
                data-skhps-base-style-status
                data-skhps-css-main-status
              >
                CSS總表載入中...
              </strong>
            </div>

            <div class="skhps-meta-item skhps-css-setting-meta-item">
              <span class="skhps-meta-label">資料來源</span>
              <strong class="skhps-meta-value">
                Google Sheet
              </strong>
            </div>

            <div class="skhps-meta-item skhps-css-setting-meta-item">
              <span class="skhps-meta-label">模式</span>
              <strong class="skhps-meta-value">
                AJAX Shell
              </strong>
            </div>
          </div>

          <nav class="skhps-action-grid skhps-css-setting-actions" aria-label="CSS Setting 頁面操作">
            <a class="skhps-btn skhps-btn-secondary" href="admin.html">
              回系統後台
            </a>
            <a class="skhps-btn skhps-btn-secondary" href="index.html">
              回首頁
            </a>
          </nav>
        </div>
      </section>

      <section class="skhps-section skhps-css-setting-section" aria-labelledby="cssPlaygroundTitle">
        <div class="skhps-section-head skhps-css-setting-section-head">
          <div>
            <p class="skhps-eyebrow">Playground</p>
            <h2 id="cssPlaygroundTitle" class="skhps-section-title">
              Playground 分頁
            </h2>
          </div>
          <p class="skhps-page-subtitle skhps-section-description">
            目前先保留既有 Playground 入口；資料來源統一寫入 CSS總表，分類由 component 欄位決定。
          </p>
        </div>

        <article class="skhps-hero-card skhps-css-setting-control-card">
          <div class="skhps-toolbar skhps-css-setting-toolbar" aria-label="Playground 分頁">
            <button class="skhps-btn skhps-btn-primary" type="button" data-css-fragment="CSS/base-style-playground.html">
              基礎樣式
            </button>
            <button class="skhps-btn skhps-btn-secondary" type="button" data-css-fragment="CSS/token-style-playground.html">
              Token
            </button>
            <button class="skhps-btn skhps-btn-secondary" type="button" data-css-fragment="CSS/layout-style-playground.html">
              Layout
            </button>
            <button class="skhps-btn skhps-btn-secondary" type="button" data-css-fragment="CSS/header-style-playground.html">
              Header
            </button>
            <button class="skhps-btn skhps-btn-secondary" type="button" data-css-fragment="CSS/footer-style-playground.html">
              Footer
            </button>
            <button class="skhps-btn skhps-btn-secondary" type="button" data-css-fragment="CSS/button-style-playground.html">
              按鈕
            </button>
            <button class="skhps-btn skhps-btn-secondary" type="button" data-css-fragment="CSS/form-style-playground.html">
              表單
            </button>
          </div>

          <p id="cssAjaxStatus" class="skhps-page-subtitle skhps-css-setting-status">
            尚未載入。
          </p>
        </article>
      </section>

      <section class="skhps-section skhps-css-setting-fragment-section" aria-label="CSS Playground 內容">
        <div id="cssAjaxContent" class="skhps-css-setting-content"></div>
      </section>
    </div>
  </main>

  <footer class="skhps-footer" data-skhps-footer>
    Footer 載入中...
  </footer>

  <script src="assets/js/runtime.js?v=202606131555"></script>
  <script src="assets/js/loading-gate.js?v=20260611"></script>
  <script src="assets/js/config.js?v=202606131230"></script>
  <script src="assets/js/route.js?v=202606131230"></script>
  <script src="assets/js/backend-client.js?v=20260611"></script>
  <script src="assets/js/css-sheet-runtime.js?v=20260611"></script>
  <script src="assets/js/header.js?v=20260611"></script>
  <script src="assets/js/page-map.js?v=202606131610"></script>

  <script src="assets/js/css-setting-sheet-apply.js?v=20260611"></script>
  <script src="assets/js/css-setting-style-editor.js?v=20260611"></script>
  <script src="assets/js/css-setting-editor-core.js?v=20260611"></script>
  <script src="assets/js/css-setting-sheet-save.js?v=20260611"></script>
  <script src="assets/js/footer-style-editor.js?v=20260611"></script>
  <script src="assets/js/footer.js?v=202606131555"></script>

  <script>
    (function () {
      "use strict";

      var statusEl = document.getElementById("cssAjaxStatus");
      var contentEl = document.getElementById("cssAjaxContent");

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function setStatus(message) {
        if (statusEl) {
          statusEl.textContent = message;
        }
      }

      function initLoadedFragment(path) {
        window.setTimeout(function () {
          if (
            path === "CSS/footer-style-playground.html" &&
            window.SKHPSFooterStyleEditor &&
            typeof window.SKHPSFooterStyleEditor.init === "function"
          ) {
            window.SKHPSFooterStyleEditor.init();
          }

          if (
            window.SKHPSCssSettingEditorCore &&
            typeof window.SKHPSCssSettingEditorCore.init === "function"
          ) {
            window.SKHPSCssSettingEditorCore.init(contentEl);
          }
        }, 0);

        if (window.SKHPSCssStyleEditState) {
          window.SKHPSCssStyleEditState.init(contentEl);
        }

        if (window.SKHPSApplyBaseStyleFromSheet) {
          window.SKHPSApplyBaseStyleFromSheet();
        }

        if (
          window.SKHPSCssSettingEditorCore &&
          typeof window.SKHPSCssSettingEditorCore.init === "function"
        ) {
          window.SKHPSCssSettingEditorCore.init(contentEl);
        }

        if (
          window.SKHPSFooterStyleEditor &&
          typeof window.SKHPSFooterStyleEditor.init === "function"
        ) {
          window.SKHPSFooterStyleEditor.init();
        }
      }

      function loadFragment(path) {
        setStatus("載入中：" + path);

        fetch(path, { cache: "no-store" })
          .then(function (res) {
            return res.text().then(function (text) {
              return {
                ok: res.ok,
                status: res.status,
                statusText: res.statusText,
                text: text
              };
            });
          })
          .then(function (result) {
            if (!result.ok) {
              throw new Error("HTTP " + result.status + " " + result.statusText);
            }

            contentEl.innerHTML = result.text;
            setStatus("已載入：" + path);

            initLoadedFragment(path);

            contentEl.scrollIntoView({
              behavior: "smooth",
              block: "start"
            });
          })
          .catch(function (error) {
            contentEl.innerHTML =
              '<section class="skhps-card skhps-css-setting-error-card">' +
              '<h2 class="skhps-section-title">載入失敗</h2>' +
              '<pre class="skhps-code-block">' +
              escapeHtml(error && error.message ? error.message : error) +
              '</pre>' +
              '</section>';

            setStatus("載入失敗：" + path);
          });
      }

      document.querySelectorAll("[data-css-fragment]").forEach(function (button) {
        button.addEventListener("click", function () {
          loadFragment(button.getAttribute("data-css-fragment"));
        });
      });

      window.SKHPSCssAjaxPage = {
        loadFragment: loadFragment
      };

      loadFragment("CSS/base-style-playground.html");
    })();
  </script>
</body>
</html>
