<!DOCTYPE html>
<!--
檔案位置：skhpsv2/admin.html
時間戳記：2026-06-19 12:35 UTC+8
用途：系統後台；固定核心工具只保留後台專案啟動器，其他後台功能由 registry 中啟用且「顯示位置」為後台的外部專案決定。
水庫理論：
- 本頁是 skhpsv2 水庫本體頁面。
- Header 由 assets/js/header.js 掛載。
- Footer 只顯示 runtime 狀態，不參與 loading gate。
- 樣式不寫 inline CSS，交給 CSS Sheet / 共用 CSS class。
-->
<html
  lang="zh-Hant"
  class="skhps-loading skhps-css-loading skhps-shell-loading skhps-main-loading"
  data-skhps-entry-scope="skhps-core"
  data-skhps-page-id="admin"
  data-skhps-page-map-current="系統後台"
  data-loading-title="系統後台"
  data-skhps-loading-tasks="css-runtime,admin-backend-apps"
  data-skhps-shell-ready="false"
  data-skhps-page-ready="false"
>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <script>
    (function () {
      "use strict";

      var host = String(location.hostname || "").toLowerCase();
      var isDev =
        host === "127.0.0.1" ||
        host === "localhost" ||
        host.indexOf("dev-skhps") >= 0;

      var version = isDev ? String(Date.now()) : "prod";

      document.write(
        '<link rel="stylesheet" href="assets/css/skhps-loading.css?v=' +
        encodeURIComponent(version) +
        '">'
      );

      document.write(
        '<script src="assets/js/skhps-entry.js?v=' +
        encodeURIComponent(version) +
        '"><\/script>'
      );
    })();
  </script>
  <title>系統後台</title>
</head>

<body class="skhps-body">
  <header id="header" class="skhps-header" data-skhps-header></header>

  <main class="skhps-page skhps-admin-page" data-skhps-main>
    <div class="skhps-container skhps-admin-shell">
      <section class="skhps-hero skhps-admin-hero" aria-labelledby="adminTitle">
        <div class="skhps-hero-card skhps-admin-card">
          <div class="skhps-admin-hero-content">
            <p class="skhps-eyebrow">Admin</p>
            <h1 id="adminTitle" class="skhps-page-title skhps-admin-title">
              系統後台
            </h1>
            <p class="skhps-page-subtitle skhps-admin-subtitle">
              skhpsv2 後台只保留水庫核心管理入口；CSS Setting 與業務後台都由外部專案 registry 決定是否顯示。
            </p>
          </div>
        </div>
      </section>

      <div aria-label="後台管理區">
        <aside aria-labelledby="adminCoreTitle">
          <section class="skhps-section skhps-admin-section">
            <div class="skhps-section-head skhps-admin-section-head">
              <div>
                <p class="skhps-eyebrow">Core Tools</p>
                <h2 id="adminCoreTitle" class="skhps-section-title">固定後台功能</h2>
              </div>
            </div>

            <nav class="skhps-action-grid skhps-admin-actions" aria-label="固定後台功能">
              <a class="skhps-btn skhps-btn-primary skhps-btn-lg" href="backend-project-launcher.html">
                後台專案啟動器
              </a>
              <a class="skhps-btn skhps-btn-primary skhps-btn-lg" href="tools.html">
                工具包
              </a>
            </nav>
          </section>
        </aside>

        <section class="skhps-section skhps-admin-section" aria-labelledby="backendAppsTitle">
          <div class="skhps-section-head skhps-admin-section-head">
            <div>
              <p class="skhps-eyebrow">Backend Apps</p>
              <h2 id="backendAppsTitle" class="skhps-section-title">後台外部專案</h2>
            </div>

            <p class="skhps-page-subtitle skhps-section-description" data-skhps-admin-backend-apps-status>
              後台外部專案載入中...
            </p>
          </div>

          <div data-skhps-admin-backend-apps></div>
        </section>
      </div>
    </div>
  </main>

  <footer data-skhps-footer class="skhps-footer">
    Footer 載入中...
  </footer>

  <script>
    (function () {
      "use strict";

      function loadAdminScript() {
        var script = document.createElement("script");
        script.src = "assets/js/admin.js?v=20260613";
        script.async = false;
        document.body.appendChild(script);
      }

      function waitForEntryCoreReady() {
        var startedAt = Date.now();

        function ready() {
          return Boolean(
            window.SKHPSLoading ||
            window.SKHPSBackend ||
            window.SKHPS_CONFIG ||
            window.SKHPSCssRuntime ||
            window.SKHPSCssSheetRuntime
          );
        }

        function tick() {
          if (ready() || Date.now() - startedAt > 6000) {
            loadAdminScript();
            return;
          }
          window.setTimeout(tick, 50);
        }

        tick();
      }

      waitForEntryCoreReady();
    })();
  </script>
</body>
</html>
