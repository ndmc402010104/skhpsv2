<!DOCTYPE html>
<!--
檔案位置：skhpsv2/index.html
時間戳記：2026-06-11 UTC+8
首頁調整：移除 QR 簽到卡片與頁面內 Runtime 診斷區；移除頁面後台大卡；本版暫時拆除頁面內寫死 header，保留 header 掛載點，下一步由 assets/js/header.js 掛載。
用途：整外資訊系統首頁。

Loading Gate：
- 首頁使用 AND gate。
- 必須等待：
  1. css-runtime
  2. external-apps-runtime
- 任何任務成功或失敗都必須回報 loading gate。
- 8 秒後若仍未 all-ready，首頁 fallback 強制解除，診斷資訊先由 script 保留，之後交給 footer 顯示。

重要規則：
- 首頁不是外部專案，不載入 app-entry.js。
- 首頁不會 registerExternalApp。
- 首頁不放 inline CSS。
- 首頁只提供語意結構與 class，樣式由 CSS Sheet / 共用 CSS 管理。
-->
<html
  lang="zh-Hant"
  class="skhps-css-loading"
  data-skhps-page-id="index"
  data-skhps-page-map-current="首頁"
  data-loading-title="整外資訊系統首頁"
  data-skhps-loading-tasks="css-runtime,external-apps-runtime"
>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <script src="assets/js/loading-cache-probe.js?v=20260611"></script>
  <link rel="stylesheet" href="assets/css/skhps-loading.css?v=202606131245">
  <title>整外資訊系統首頁</title>
</head>

<body class="skhps-body">
  <!-- Header 暫時拆除：改由 assets/js/header.js 掛載 -->
  <header id="header" class="skhps-header" data-skhps-header></header>

  <main class="skhps-page skhps-index-page">
    <div class="skhps-container skhps-index-shell">
      <section class="skhps-hero skhps-index-hero" aria-labelledby="indexTitle">
        <div class="skhps-hero-card skhps-index-hero-card">
          <div class="skhps-index-hero-content">
            <p class="skhps-eyebrow">Shin Kong Wu Ho-Su Memorial Hospital</p>
            <h1 id="indexTitle" class="skhps-page-title skhps-index-title">
              整外資訊系統首頁
            </h1>
            <p class="skhps-page-subtitle skhps-index-subtitle">
              這裡是整形外科共用入口。系統入口會依目前環境與啟用狀態自動顯示。
            </p>
          </div>

          <div class="skhps-meta-grid skhps-index-meta-grid" aria-label="首頁狀態">
            <div class="skhps-meta-item skhps-index-meta-item">
              <span class="skhps-meta-label">目前環境</span>
              <strong class="skhps-meta-value" data-skhps-runtime-text>判斷中</strong>
            </div>

            <div class="skhps-meta-item skhps-index-meta-item">
              <span class="skhps-meta-label">外部專案</span>
              <strong class="skhps-meta-value" data-skhps-external-apps-count>載入中</strong>
            </div>

            <div class="skhps-meta-item skhps-index-meta-item">
              <span class="skhps-meta-label">Loading Gate</span>
              <strong class="skhps-meta-value" data-skhps-loading-summary>等待中</strong>
            </div>
          </div>
        </div>
      </section>

      <section class="skhps-section skhps-index-section skhps-system-entry-section" aria-labelledby="externalAppsTitle">
        <div class="skhps-section-head skhps-index-section-head">
          <div>
            <p class="skhps-eyebrow">System Entrances</p>
            <h2 id="externalAppsTitle" class="skhps-section-title">系統入口</h2>
          </div>
          <p class="skhps-page-subtitle skhps-section-description">
            已啟用的功能與外部系統會以卡片顯示在這裡。
          </p>
        </div>

        <div class="skhps-system-entry-grid">
          <article class="skhps-hero-card skhps-system-entry-card">
            <p
              class="skhps-page-subtitle skhps-system-entry-status"
              data-skhps-external-apps-status
            >
              系統入口載入中...
            </p>

            <nav
              class="skhps-action-grid skhps-external-apps-grid"
              aria-label="系統入口"
              data-skhps-external-apps
            ></nav>
          </article>
        </div>
      </section>
    </div>
  </main>

  <footer data-skhps-footer class="skhps-footer">
    Footer 載入中...
  </footer>

  <script src="assets/js/runtime.js?v=202606131555"></script>
  <script src="assets/js/loading-gate.js?v=20260611"></script>

  <script>
    (function () {
      "use strict";

      window.setTimeout(function () {
        var html = document.documentElement;

        if (
          window.SKHPSLoading &&
          typeof window.SKHPSLoading.getState === "function"
        ) {
          var state = window.SKHPSLoading.getState();

          if (state && state.released) {
            return;
          }

          var required = state && Array.isArray(state.required) ? state.required : [];
          var done = state && Array.isArray(state.done) ? state.done : [];
          var failed = state && Array.isArray(state.failed) ? state.failed : [];

          required.forEach(function (task) {
            if (done.indexOf(task) >= 0 || failed.indexOf(task) >= 0) {
              return;
            }

            console.warn("[SKHPSIndex] fallback fail pending task:", task);

            if (typeof window.SKHPSLoading.fail === "function") {
              window.SKHPSLoading.fail(task, new Error("index fallback timeout"));
            }
          });

          html.setAttribute("data-skhps-index-fallback-at", new Date().toISOString());
          return;
        }

        console.warn("[SKHPSIndex] fallback release without SKHPSLoading");

        html.classList.remove("skhps-css-loading");
        html.classList.remove("skhps-loading");

        if (document.body) {
          document.body.classList.remove("skhps-css-loading");
          document.body.classList.remove("skhps-loading");
        }

        html.setAttribute("data-skhps-loading-released", "true");
        html.setAttribute("data-skhps-loading-release-reason", "index-fallback-no-gate");
        html.setAttribute("data-skhps-index-fallback-at", new Date().toISOString());
      }, 8000);
    })();
  </script>

  <script>
    (function () {
      "use strict";

      function $(selector) {
        return document.querySelector(selector);
      }

      function getRuntime() {
        var fromHtml = document.documentElement.getAttribute("data-skhps-runtime");
        if (fromHtml) return fromHtml;

        var host = String(window.location.hostname || "").toLowerCase();

        if (host === "127.0.0.1" || host === "localhost" || host === "") {
          return "local-dev";
        }

        if (
          host.indexOf("dev-") === 0 ||
          host.indexOf("dev.") === 0 ||
          host.indexOf("dev-skhps") >= 0
        ) {
          return "dev";
        }

        return "prod";
      }

      function safeJson(value) {
        try {
          return JSON.stringify(value, null, 2);
        } catch (error) {
          return String(value);
        }
      }

      function updateDiagnostics() {
        var runtime = getRuntime();
        var loadingState = null;

        if (
          window.SKHPSLoading &&
          typeof window.SKHPSLoading.getState === "function"
        ) {
          loadingState = window.SKHPSLoading.getState();
        }

        var runtimeLabel = $("[data-skhps-runtime-label]");
        var runtimeText = $("[data-skhps-runtime-text]");
        var loadingSummary = $("[data-skhps-loading-summary]");
        var loadingStateBox = $("[data-skhps-loading-state]");
        var externalDebugBox = $("[data-skhps-external-apps-debug]");
        var externalCount = $("[data-skhps-external-apps-count]");

        if (runtimeLabel) runtimeLabel.textContent = runtime;
        if (runtimeText) runtimeText.textContent = runtime;

        if (loadingSummary) {
          loadingSummary.textContent = loadingState && loadingState.releaseReason
            ? loadingState.releaseReason
            : "等待中";
        }

        if (loadingStateBox) {
          loadingStateBox.textContent = loadingState
            ? safeJson(loadingState)
            : "SKHPSLoading 尚未建立";
        }

        if (externalDebugBox) {
          externalDebugBox.textContent = safeJson({
            ready: document.documentElement.getAttribute("data-skhps-external-apps-runtime-ready"),
            error: document.documentElement.getAttribute("data-skhps-external-apps-runtime-error"),
            runtime: runtime
          });
        }

        if (externalCount) {
          var buttons = document.querySelectorAll("[data-skhps-external-app-id]");
          if (document.documentElement.getAttribute("data-skhps-external-apps-runtime-ready") === "true") {
            externalCount.textContent = String(buttons.length);
          } else {
            externalCount.textContent = "載入中";
          }
        }
      }

      window.SKHPSIndexDiagnostics = {
        update: updateDiagnostics
      };

      window.setInterval(updateDiagnostics, 1000);

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", updateDiagnostics);
      } else {
        updateDiagnostics();
      }
    })();
  </script>

  <script src="assets/js/config.js?v=202606131230"></script>
  <script src="assets/js/route.js?v=202606131230"></script>
  <script src="assets/js/backend-client.js?v=20260611"></script>
  <script src="assets/js/css-sheet-runtime.js?v=20260611"></script>
  <script src="assets/js/header.js?v=20260611"></script>
  <script src="assets/js/page-map.js?v=202606131610"></script>
  <script src="assets/js/footer.js?v=202606131555"></script>
  <script src="assets/js/external-apps-runtime.js?v=202606131230"></script>
</body>
</html>
