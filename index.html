<!DOCTYPE html>
<!--

<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>整外資訊系統首頁</title>
</head>
<body>
  <main>
    <h1>整外資訊系統首頁</h1>

    <nav>
      <ul>
        <li><a href="admin.html">系統後台</a></li>
      </ul>
    </nav>

    <section>
      <h2>後台連線測試</h2>
      <button type="button" id="testBackendBtn">測試後台 health</button>
      <pre id="backendResult">尚未測試。</pre>
    </section>
  </main>

  <footer data-skhps-footer>
    Footer 載入中...
  </footer>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/backend-client.js"></script>
  <script src="assets/js/footer.js"></script>
  <script>
    if(window.SKHPSConfig){
      window.SKHPSConfig.loadConfig().then(function(){
        if(window.SKHPSBackend){
          window.SKHPSBackend.bindHealthButton("testBackendBtn", "backendResult");
        }
      });
    }
  </script>
</body>
</html>
